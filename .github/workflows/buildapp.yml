# Original idea by @ISnackable. Thanks to him for handling the hardest parts!
# https://github.com/ISnackable/YTCubePlus/blob/main/.github/workflows/Build.yml

name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version"
        default: "18.6"
        required: true
        type: string
      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string
      decrypted_youtube_url:
        description: "Direct URL of the decrypted YouTube IPA"
        default: ""
        required: true
        type: string
      bundle_id:
        description: "Modify the bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string
      app_name:
        description: "Modify the app name"
        default: "YouTube"
        required: true
        type: string
      commit_id:
        description: "(Optional) Commit ID to build at"
        default: ""
        required: false
        type: string
      upload_artifact:
        description: "Upload IPA as artifact"
        default: false
        required: false
        type: boolean
      create_release:
        description: "Create a draft release"
        default: true
        required: false
        type: boolean
      ytuhd:
        description: "Include YTUHD (clones dav1d + libvpx)"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build uYouEnhanced
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v7
        with:
          path: main
          ref: ${{ github.event.inputs.commit_id || github.ref }}
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install ldid dpkg make wget unzip jq pipx

      - name: Set PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: actions/checkout@v7
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: SDK Caching
        id: SDK
        uses: actions/cache@v6
        with:
          path: theos/sdks/
          key: iOS-${{ inputs.sdk_version }}-SDK

      - name: Download iOS SDK
        if: steps.SDK.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/aricloverALT/sdks/ sdks
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS${{ inputs.sdk_version }}.sdk
          git checkout --quiet
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Setup Theos Jailed
        uses: actions/checkout@v7
        with:
          repository: qnblackcat/theos-jailed
          ref: master
          path: theos-jailed

      - name: Install Theos Jailed
        run: ./theos-jailed/install
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Fix Theos broken pipe issue
        run: |
          SCRIPT=$(find $THEOS -name convert_xml_plist.sh 2>/dev/null | head -1)
          if [ -n "$SCRIPT" ]; then
            sed -i '' 's/od -c "$i" | head/od -c "$i" 2>\/dev\/null | head/g' "$SCRIPT"
            echo "Fixed broken pipe"
          fi

      - name: Install cyan and tbd
        run: |
          pipx install https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          wget --quiet "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd

      - name: YTUHD Libraries (only if enabled)
        if: ${{ inputs.ytuhd }}
        run: |
          echo "Installing YTUHD + dav1d + libvpx"
          git clone --quiet --depth=1 https://code.videolan.org/videolan/dav1d.git $THEOS/vendor/dav1d
          git clone --quiet --depth=1 https://chromium.googlesource.com/webm/libvpx $THEOS/vendor/libvpx
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTUHD.git YTUHD

      - name: Hash YT ipa url
        run: |
          URL_YT="$(jq -r '.inputs.decrypted_youtube_url' $GITHUB_EVENT_PATH)"
          echo ::add-mask::$URL_YT
          echo URL_YT=$URL_YT >> $GITHUB_ENV

      - name: Prepare YouTube iPA
        id: prepare_youtube
        run: |
          wget "$YOUTUBE_URL" --quiet -O main/YouTube.ipa
          cd main
          mv YouTube.ipa YouTube.zip
          unzip -q YouTube.zip
          youtube_version=$(defaults read "$(pwd)/Payload/YouTube.app/Info" CFBundleVersion)
          echo "YT_VERSION=$youtube_version" >> $GITHUB_ENV
          echo "youtube_version=${youtube_version}" >> $GITHUB_OUTPUT

        env:
          YOUTUBE_URL: ${{ env.URL_YT }}

      - name: Fix compiling & Build Package
        id: build_package
        run: |
          cd main
          sed -i '' "s/^BUNDLE_ID .*/BUNDLE_ID = ${{ inputs.bundle_id }}/" Makefile || echo "BUNDLE_ID = ${{ inputs.bundle_id }}" >> Makefile
          sed -i '' "s/^DISPLAY_NAME .*/DISPLAY_NAME = ${{ inputs.app_name }}/" Makefile || echo "DISPLAY_NAME = ${{ inputs.app_name }}" >> Makefile
          sed -i '' "s/^export TARGET .*/export TARGET = iphone:clang:${{ inputs.sdk_version }}:16.0/" Makefile || echo "export TARGET = iphone:clang:${{ inputs.sdk_version }}:16.0" >> Makefile
          
          # YTUHD flag
          if [ "${{ inputs.ytuhd }}" = "true" ]; then
            echo "YTUHD_ENABLED=1" >> Makefile
          else
            echo "YTUHD_ENABLED=0" >> Makefile
          fi
          
          make package THEOS_PACKAGE_SCHEME=rootless IPA=Payload/YouTube.app FINALPACKAGE=1
          echo "package=$(ls -t packages | head -n1)" >> $GITHUB_OUTPUT

        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git OpenYouTubeSafariExtension
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout --quiet
          mv *.appex ..

      - name: Normalize Extension Bundle ID for SideStore
        run: |
          set -euo pipefail

          PARENT_BUNDLE="${{ inputs.bundle_id }}"
          ORIG_PREFIX="com.google.ios.youtube"

          echo "Normalizing extension CFBundleIdentifier(s) to use parent prefix: ${PARENT_BUNDLE}"

          update_plist_id() {
            PLIST_PATH="$1"
            if [ ! -f "$PLIST_PATH" ]; then
              return
            fi
            if /usr/bin/plutil -convert xml1 "$PLIST_PATH" >/dev/null 2>&1; then
              :
            fi
            CURRENT_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST_PATH" 2>/dev/null || true)
            if [ -z "$CURRENT_ID" ]; then
              return
            fi
            if [[ "$CURRENT_ID" == "$ORIG_PREFIX"* ]]; then
              SUFFIX="${CURRENT_ID#${ORIG_PREFIX}.}"
              if [ "$SUFFIX" = "$CURRENT_ID" ]; then
                SUFFIX="Extension"
              fi
              NEW_ID="${PARENT_BUNDLE}.${SUFFIX}"
              echo "Updating $PLIST_PATH: $CURRENT_ID -> $NEW_ID"
              /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $NEW_ID" "$PLIST_PATH" || \
                /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string $NEW_ID" "$PLIST_PATH" || true
            else
              echo "Skipping $PLIST_PATH (does not start with $ORIG_PREFIX): $CURRENT_ID"
            fi
          }

          for appex in *.appex; do
            if [ -d "$appex" ]; then
              PLIST="$appex/Info.plist"
              update_plist_id "$PLIST"
              find "$appex" -type f -name "*.plist" -o -name "*.entitlements" | while read -r f; do
                /usr/bin/plutil -convert xml1 "$f" >/dev/null 2>&1 || true
                if grep -q "$ORIG_PREFIX" "$f" >/dev/null 2>&1; then
                  echo "Replacing occurrences in $f"
                  perl -0777 -pe "s/\Q${ORIG_PREFIX}\E/${PARENT_BUNDLE}/g" -i "$f" || true
                fi
              done
            fi
          done

          APP_PLUGINS_DIR="main/Payload/YouTube.app/PlugIns"
          if [ -d "$APP_PLUGINS_DIR" ]; then
            for appex in "$APP_PLUGINS_DIR"/*.appex; do
              if [ -d "$appex" ]; then
                PLIST="$appex/Info.plist"
                update_plist_id "$PLIST"
                find "$appex" -type f -name "*.plist" -o -name "*.entitlements" | while read -r f; do
                  /usr/bin/plutil -convert xml1 "$f" >/dev/null 2>&1 || true
                  if grep -q "$ORIG_PREFIX" "$f" >/dev/null 2>&1; then
                    echo "Replacing occurrences in $f"
                    perl -0777 -pe "s/\Q${ORIG_PREFIX}\E/${PARENT_BUNDLE}/g" -i "$f" || true
                  fi
                done
              fi
            done
          fi

          MAIN_APP_DIR="main/Payload/YouTube.app"
          if [ -d "$MAIN_APP_DIR" ]; then
            find "$MAIN_APP_DIR" -type f -name "*.plist" -o -name "*.entitlements" | while read -r f; do
              /usr/bin/plutil -convert xml1 "$f" >/dev/null 2>&1 || true
              if grep -q "$ORIG_PREFIX" "$f" >/dev/null 2>&1; then
                echo "Replacing occurrences in $f"
                perl -0777 -pe "s/\Q${ORIG_PREFIX}\E/${PARENT_BUNDLE}/g" -i "$f" || true
              fi
            done
          fi

          echo "Normalization complete."
        shell: bash

      - name: Inject Tweaks Into IPA
        run: |
          IPA_IN="main/packages/${{ steps.build_package.outputs.package }}"
          OUTNAME="uYouEnhanced_${{ env.YT_VERSION }}_v${{ inputs.uyou_version }}.ipa"
          tweaks="OpenYouTubeSafariExtension.appex"
          for f in main/packages/*.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done
          cyan -i "$IPA_IN" -o "$OUTNAME" -uwef $tweaks -n "${{ inputs.app_name }}" -b ${{ inputs.bundle_id }}

      - name: Upload Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v7
        env:
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          name: uYouEnhanced_${{ env.YOUTUBE_VERSION }}_${{ env.UYOU_VERSION }}
          path: ${{ github.workspace }}/main/packages/${{ steps.build_package.outputs.package }}
          if-no-files-found: error

      - name: Create Release
        if: ${{ inputs.create_release }}
        id: create_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UYOU_VERSION: ${{ inputs.uyou_version }}
          YOUTUBE_VERSION: ${{ steps.prepare_youtube.outputs.youtube_version }}
        with:
          tag_name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          name: v${{ env.YOUTUBE_VERSION }}-${{ env.UYOU_VERSION }}-(${{ github.run_number }})
          files: main/packages/*.ipa
          draft: true
